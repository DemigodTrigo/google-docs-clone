services:

  postgres:
    image: postgres:16
    container_name: docs-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: docs_db
      POSTGRES_USER: docs_user
      POSTGRES_PASSWORD: docs_password
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docs_user -d docs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data: