server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/docs_db
    username: docs_user
    password: docs_password
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true